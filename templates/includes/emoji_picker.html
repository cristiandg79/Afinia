<div class="emoji-picker {{ class_name|default:'' }}" data-emoji-picker data-emoji-target="{{ target|default:'body' }}">
    <button class="emoji-toggle" type="button" data-emoji-toggle aria-label="A&ntilde;adir emoticono">&#9786;</button>
    <div class="emoji-panel" data-emoji-panel hidden>
        <input type="search" data-emoji-search placeholder="Buscar emoji">
        <div class="emoji-tabs" data-emoji-tabs></div>
        <div class="emoji-grid" data-emoji-grid></div>
    </div>
</div>
